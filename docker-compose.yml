services:
  auralis:
    build:
      context: .
    network_mode: host
    restart: unless-stopped
    volumes:
      - /home/kwa/.cache/huggingface:/root/.cache/huggingface
      - ./.cache/pip:/root/.cache/pip
    deploy:
      resources:
        reservations:
          devices:
          - driver: cdi
            capabilities: [gpu]
            device_ids:
            - nvidia.com/gpu=all
