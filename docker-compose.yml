services:
  auralis:
    build:
      context: .
    network_mode: host
    restart: unless-stopped
    volumes:
      - /home/kwa/.cache/huggingface:/root/.cache/huggingface
      - ./.cache/pip:/root/.cache/pip
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
